<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időjárás – Budapest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0e0e10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SAL Tools">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div class="app">
        <header>
            <div class="logo-group">
                <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleNav()" aria-label="Menü">
                    <svg viewBox="0 0 18 18" width="18" height="18"><path d="M2 4h14v2H2zm0 4h10v2H2zm0 4h12v2H2z" fill="#0e0e10"/></svg>
                </button>
                <div class="nav-dropdown" id="navDropdown">
                    <a href="index.html" class="nav-link"><span class="nav-link-icon"><svg viewBox="0 0 16 16" width="15" height="15" fill="none"><rect x="1" y="2" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="1" y="12" width="12" height="2" rx="1" fill="currentColor"/></svg></span>Random Generator</a>
                    <a href="idojaras.html" class="nav-link active"><span class="nav-link-icon">🌤️</span>Időjárás</a>
                    <a href="hirek.html" class="nav-link"><span class="nav-link-icon">📰</span>Hírek</a>
                </div>
            </div>
            <button id="pwaInstallBtn" class="btn-pwa-install" style="display:none" onclick="pwaInstall()">Telepítés</button>
            <div class="logo-wrapper">
                <img class="sal-logo" src="SAL_Logo.svg.svg" alt="SAL">
                <svg class="sal-hover-ring" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path class="sal-arc sal-arc-1" d="M 361,79 A 200,200 0 0,1 79,361"/>
                    <path class="sal-arc sal-arc-2" d="M 79,361 A 200,200 0 0,1 361,79"/>
                </svg>
            </div>
        </header>

        <div class="weather-page">
            <div class="weather-page-header">
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
                    <span class="output-label" id="cityTitle">Budapest &mdash; 9 napos előrejelzés</span>
                    <div class="city-selector">
                        <button class="btn-city active" id="city-budapest" onclick="selectCity('budapest')"><span>Budapest</span></button>
                        <button class="btn-city" id="city-gyula"    onclick="selectCity('gyula')"><span>Gyula</span></button>
                        <button class="btn-city" id="city-szeged"   onclick="selectCity('szeged')"><span>Szeged</span></button>
                        <button class="btn-city" id="city-xian"     onclick="selectCity('xian')"><span>Xi'an</span></button>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:12px">
                    <span class="char-count" id="lastUpdated"></span>
                    <button class="btn-refresh" id="refreshBtn" onclick="fetchWeather(true)">
                        <span class="refresh-icon">↻</span> Frissítés
                    </button>
                </div>
            </div>
            <div class="weather-grid" id="weatherContainer">
                <div class="weather-loading">
                    <div class="weather-spinner"></div>
                    <div>Időjárás betöltése...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="weather-canvas.js"></script>
    <script src="idojaras.js"></script>
    <script src="nav.js"></script>
    <span class="version-badge">v3.1</span>
</body>
</html>
