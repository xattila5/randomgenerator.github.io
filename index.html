<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Szöveg Generátor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <div class="logo-group">
                <div class="logo-icon">
                    <svg viewBox="0 0 18 18"><path d="M2 4h14v2H2zm0 4h10v2H2zm0 4h12v2H2z"/></svg>
                </div>
                <h1>Random Generator</h1>
            </div>
            <span class="version-badge">v2.0</span>
        </header>

        <div class="main-grid">
            <div class="card">
                <div class="card-accent-line"></div>
                <div class="card-label">01 — Szöveg generálása</div>
                <div class="input-row">
                    <input type="number" id="karakterszam" value="100" min="1" max="100000" placeholder="Karakterszám...">
                    <button class="btn-primary" onclick="displayRandomText()"><span>Generálás</span></button>
                </div>
            </div>

            <div class="card">
                <div class="card-accent-line"></div>
                <div class="card-label">02 — Karakter kiemelés</div>
                <div class="input-row">
                    <input type="text" id="highlightIndex" placeholder="Pl.: 1, 5, 12, 20">
                    <button class="btn-secondary" onclick="highlightCharacters()"><span>Kiemelés</span></button>
                </div>
            </div>

            <div class="output-card" id="outputCard">
                <div class="output-header">
                    <div class="output-title">
                        <div class="status-dot" id="statusDot"></div>
                        <span class="output-label">Kimenet</span>
                    </div>
                    <div class="output-actions">
                        <span class="char-count" id="charCount"></span>
                        <button class="btn-copy" id="copyButton" onclick="copyToClipboard()">Másolás</button>
                    </div>
                </div>
                <div class="output-body">
                    <div id="randomText"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
