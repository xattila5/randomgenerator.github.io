<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hírek – S.A.L. Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="news-body">
    <div class="app">
        <header>
            <div class="logo-group">
                <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleNav()" aria-label="Menü">
                    <svg viewBox="0 0 18 18" width="18" height="18"><path d="M2 4h14v2H2zm0 4h10v2H2zm0 4h12v2H2z" fill="#0e0e10"/></svg>
                </button>
                <div class="nav-dropdown" id="navDropdown">
                    <a href="index.html" class="nav-link"><span class="nav-link-icon"><svg viewBox="0 0 16 16" width="15" height="15" fill="none"><rect x="1" y="2" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="1" y="12" width="12" height="2" rx="1" fill="currentColor"/></svg></span>Random Generator</a>
                    <a href="idojaras.html" class="nav-link"><span class="nav-link-icon">🌤️</span>Időjárás</a>
                    <a href="hirek.html" class="nav-link active"><span class="nav-link-icon">📰</span>Hírek</a>
                </div>
            </div>
            <div class="logo-wrapper">
                <img class="sal-logo" src="SAL_Logo.svg.svg" alt="SAL">
                <svg class="sal-hover-ring" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path class="sal-arc sal-arc-1" d="M 361,79 A 200,200 0 0,1 79,361"/>
                    <path class="sal-arc sal-arc-2" d="M 79,361 A 200,200 0 0,1 361,79"/>
                </svg>
            </div>
        </header>

        <!-- Article drawer -->
        <div class="news-drawer" id="newsDrawer">
            <div class="news-drawer-overlay" onclick="closeDrawer()"></div>
            <div class="news-drawer-panel">
                <div class="news-drawer-head">
                    <button class="news-drawer-close" onclick="closeDrawer()">✕ Bezárás</button>
                    <a class="news-drawer-ext" id="drawerExtLink" href="#" target="_blank" rel="noopener noreferrer">Teljes cikk ↗</a>
                </div>
                <div class="news-drawer-body">
                    <img class="news-drawer-img" id="drawerImg" src="" alt="" style="display:none">
                    <div class="news-drawer-content" id="drawerContent"></div>
                </div>
            </div>
        </div>

        <div class="news-page">
            <div class="news-controls">
                <span class="output-label" id="newsSourceLabel">Hírek betöltése…</span>
                <div style="display:flex;align-items:center;gap:10px">
                    <div class="lang-toggle">
                        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
                        <button class="lang-btn" id="btn-hu" onclick="setLang('hu')">Magyar</button>
                    </div>
                    <button class="btn-refresh" id="refreshBtn" onclick="fetchNews()">
                        <span class="refresh-icon">↻</span> Frissítés
                    </button>
                </div>
            </div>
            <div class="news-grid" id="newsContainer">
                <div class="news-loading">
                    <div class="weather-spinner"></div>
                    <div>Hírek betöltése...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="hirek.js"></script>
    <script src="nav.js"></script>
    <span class="version-badge">v3.1</span>
</body>
</html>
