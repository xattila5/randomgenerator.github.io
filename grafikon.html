<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafikon – S.A.L. Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0e0e10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SAL Tools">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body class="news-body">
    <div class="app">
        <header>
            <div class="logo-group">
                <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleNav()" aria-label="Menü">
                    <svg viewBox="0 0 18 18" width="18" height="18"><path d="M2 4h14v2H2zm0 4h10v2H2zm0 4h12v2H2z" fill="#0e0e10"/></svg>
                </button>
                <div class="nav-dropdown" id="navDropdown">
                    <a href="index.html" class="nav-link"><span class="nav-link-icon"><svg viewBox="0 0 16 16" width="15" height="15" fill="none"><rect x="1" y="2" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="1" y="12" width="12" height="2" rx="1" fill="currentColor"/></svg></span>Random Generator</a>
                    <a href="idojaras.html" class="nav-link"><span class="nav-link-icon">🌤️</span>Időjárás</a>
                    <a href="hirek.html" class="nav-link"><span class="nav-link-icon">📰</span>Hírek</a>
                    <a href="befektetes.html" class="nav-link"><span class="nav-link-icon">📈</span>Befektetés</a>
                </div>
            </div>
            <div class="logo-wrapper" onclick="location.href='splash.html'">
                <img class="sal-logo" src="SAL_Logo.svg.svg" alt="SAL">
                <svg class="sal-hover-ring" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path class="sal-arc sal-arc-1" d="M 361,79 A 200,200 0 0,1 79,361"/>
                    <path class="sal-arc sal-arc-2" d="M 79,361 A 200,200 0 0,1 361,79"/>
                </svg>
            </div>
        </header>

        <div class="grafikon-page">
            <div class="grafikon-topbar">
                <a href="befektetes.html" class="grafikon-back-btn">← Befektetés</a>
                <div class="grafikon-asset-info">
                    <span class="grafikon-name" id="grafikonName"></span>
                    <span class="grafikon-price" id="grafikonPrice"></span>
                    <span class="grafikon-change" id="grafikonChange"></span>
                </div>
            </div>

            <div class="lw-chart-outer">
                <div id="lwChart"></div>
                <div class="scenario-legend" id="scenarioLegend"></div>
            </div>

            <div class="tv-ta-wrap">
                <div class="tradingview-widget-container" id="tvTA"></div>
            </div>

            <div class="tv-ta-wrap" id="taAnalysis"></div>
        </div>
    </div>

    <script src="grafikon.js"></script>
    <script src="nav.js"></script>
    <script src="effects.js"></script>
</body>
</html>
