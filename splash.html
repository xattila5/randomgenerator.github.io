<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.L. Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%; height: 100%;
        background: #0a0a0c;
        overflow: hidden;
        font-family: 'Syne', sans-serif;
    }

    #scene {
        position: fixed; inset: 0; z-index: 1;
    }

    /* Full-screen SVG for incoming lines + nav spokes */
    #svgMain {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        overflow: visible;
        pointer-events: none;
    }

    /* Logo wrapper — centered */
    #logoWrap {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        display: flex; flex-direction: column;
        align-items: center; gap: 20px;
        z-index: 5; pointer-events: none;
    }

    .s-logo-inner {
        position: relative;
        width: 220px; height: 220px;
    }

    /* Actual logo image — hidden until outline is drawn */
    #sLogo {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        display: block;
        opacity: 0;
        transition: opacity 1.0s ease;
    }
    #sLogo.on { opacity: 1; }

    /* SVG outline overlay — viewBox matches the 440×440 logo SVG */
    #outlineSvg {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        overflow: visible;
        transition: opacity 1.0s ease;
    }
    #outlineSvg.fade { opacity: 0; }

    /* Logo name */
    .s-logo-name {
        font-size: 0.62rem; font-weight: 700;
        letter-spacing: 0.55em; text-transform: uppercase;
        color: rgba(184,154,90,0.55);
        text-shadow: 0 0 28px rgba(184,154,90,0.18);
        opacity: 0; transition: opacity 0.9s ease;
    }
    .s-logo-name.on { opacity: 1; }

    /* Nav nodes */
    .nav-node {
        position: absolute;
        transform: translate(-50%, -50%);
        display: flex; flex-direction: column;
        align-items: center; gap: 7px;
        cursor: pointer; text-decoration: none;
        opacity: 0; z-index: 6; padding: 10px;
        transition: transform 0.22s ease;
    }
    .nav-node.on { pointer-events: auto; }
    .nav-node:hover { transform: translate(-50%, -50%) scale(1.12); }
    .nav-icon  { font-size: 1.45rem; line-height: 1; }
    .nav-label {
        font-size: 0.58rem; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(240,240,240,0.55); white-space: nowrap;
        transition: color 0.2s;
    }
    .nav-node:hover .nav-label { color: rgba(240,240,240,0.92); }

    /* Hint */
    #sHint {
        position: fixed; bottom: 28px; left: 50%;
        transform: translateX(-50%);
        font-family: 'DM Mono', monospace; font-size: 0.53rem;
        letter-spacing: 0.22em; text-transform: uppercase;
        color: rgba(255,255,255,0.15); z-index: 7;
        opacity: 0; transition: opacity 1.4s ease;
        white-space: nowrap; pointer-events: none;
    }
    #sHint.on { opacity: 1; }
    </style>
</head>
<body>

<div id="scene">

    <!-- Full-screen SVG: incoming lines + arrival sparks + nav spokes -->
    <svg id="svgMain" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Glow for incoming lines & sparks -->
            <filter id="lineGlow" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <!-- Soft glow for nav spokes -->
            <filter id="spokeGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
        </defs>
    </svg>

    <div id="logoWrap">
        <div class="s-logo-inner">

            <!--
                Outline SVG — draws the SAL logo rings & details with
                stroke-dashoffset animation. viewBox matches SAL_Logo.svg.svg (440×440).
                Ring stroke starts at the point where the incoming line arrives:
                  ring1 (outer, r=192) → starts at LEFT  → rotate(180, 220, 220)
                  ring2 (mid,   r=172) → starts at TOP   → rotate(270, 220, 220)
                  ring3 (inner, r=156) → starts at RIGHT → no rotation (SVG default)
            -->
            <svg id="outlineSvg" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="ringGlow" x="-40%" y="-40%" width="180%" height="180%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>

                <!-- Outer ring: C = 2π×192 ≈ 1206, starts at left tangent (180°) -->
                <circle id="ring1" cx="220" cy="220" r="192"
                    fill="none" stroke="#BF9130" stroke-width="2.5"
                    stroke-linecap="round"
                    transform="rotate(180, 220, 220)"
                    stroke-dasharray="1206" stroke-dashoffset="1206"
                    filter="url(#ringGlow)"/>

                <!-- Middle ring: C ≈ 1081, starts at top tangent (270°) -->
                <circle id="ring2" cx="220" cy="220" r="172"
                    fill="none" stroke="#BF9130" stroke-width="1.2"
                    stroke-linecap="round"
                    transform="rotate(270, 220, 220)"
                    stroke-dasharray="1081" stroke-dashoffset="1081"/>

                <!-- Inner ring: C ≈ 980, starts at right tangent (0° = default) -->
                <circle id="ring3" cx="220" cy="220" r="156"
                    fill="none" stroke="#6A4E14" stroke-width="1"
                    stroke-linecap="round"
                    stroke-dasharray="980" stroke-dashoffset="980"/>

                <!-- Vertical crosshair, length 384 -->
                <line id="ch1" x1="220" y1="28" x2="220" y2="412"
                    stroke="rgba(184,154,90,0.2)" stroke-width="0.6"
                    stroke-dasharray="384" stroke-dashoffset="384"/>

                <!-- Horizontal crosshair -->
                <line id="ch2" x1="28" y1="220" x2="412" y2="220"
                    stroke="rgba(184,154,90,0.2)" stroke-width="0.6"
                    stroke-dasharray="384" stroke-dashoffset="384"/>

                <!-- Top star tick, length 24 -->
                <line id="starT" x1="220" y1="20" x2="220" y2="44"
                    stroke="#BF9130" stroke-width="2"
                    stroke-dasharray="24" stroke-dashoffset="24"/>

                <!-- Bottom diamond, perimeter ≈ 4×√(64+144) ≈ 58 -->
                <path id="diamond"
                    d="M 220,344 L 228,356 L 220,368 L 212,356 Z"
                    fill="none" stroke="#BF9130" stroke-width="1.5" stroke-linejoin="miter"
                    stroke-dasharray="58" stroke-dashoffset="58"/>
            </svg>

            <img id="sLogo" src="SAL_Logo.svg.svg" alt="SAL">
        </div>
        <div class="s-logo-name" id="sLogoName">S.A.L. Tools</div>
    </div>
</div>

<div id="sHint">válassz oldalt</div>

<script>
(function () {
'use strict';

const scene      = document.getElementById('scene');
const svgMain    = document.getElementById('svgMain');
const logo       = document.getElementById('sLogo');
const outlineSvg = document.getElementById('outlineSvg');
const logoName   = document.getElementById('sLogoName');
const hint       = document.getElementById('sHint');

// Outline ring elements
const ring1   = document.getElementById('ring1');
const ring2   = document.getElementById('ring2');
const ring3   = document.getElementById('ring3');
const ch1     = document.getElementById('ch1');
const ch2     = document.getElementById('ch2');
const starT   = document.getElementById('starT');
const diamond = document.getElementById('diamond');

let W, H, CX, CY;

/*
 * Ring radii in DISPLAY pixels.
 * outlineSvg is 220px × 220px with viewBox 0 0 440 440 → scale = 0.5
 * R1 = 192 × 0.5 = 96 px  (outer ring left/right tangent offset from center)
 * R2 = 172 × 0.5 = 86 px  (middle ring top/bottom offset)
 * R3 = 156 × 0.5 = 78 px  (inner ring left/right offset)
 */
const R1 = 96;   // outer
const R2 = 86;   // middle
const R3 = 78;   // inner

const LINE_SPEED = 1000; // px/s — speed of incoming lines

/* ── Nav ─────────────────────────────────────────────────── */
const NODES = [
    { name: 'Befektetés', icon: '📈', url: 'befektetes.html', dx: +310, dy:  +48 },
    { name: 'Hírek',      icon: '📰', url: 'hirek.html',      dx: +182, dy: -218 },
    { name: 'Időjárás',   icon: '🌤️', url: 'idojaras.html',   dx: -182, dy: +218 },
    { name: 'Random Gen', icon: '⚙️', url: 'index.html',      dx: -310, dy:  -48 },
];
const nodeEls   = [];
const spokeData = [];

/* ── Helpers ────────────────────────────────────────────── */

/** Create an SVG line in #svgMain, starting fully hidden (dashoffset = length) */
function makeLine(x1, y1, x2, y2, strokeWidth, opacity) {
    const el  = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    const len = Math.hypot(x2 - x1, y2 - y1);
    el.setAttribute('x1', x1); el.setAttribute('y1', y1);
    el.setAttribute('x2', x2); el.setAttribute('y2', y2);
    el.setAttribute('stroke', `rgba(184,154,90,${opacity})`);
    el.setAttribute('stroke-width', strokeWidth);
    el.setAttribute('stroke-linecap', 'round');
    el.setAttribute('stroke-dasharray', len);
    el.setAttribute('stroke-dashoffset', len);
    el.setAttribute('filter', 'url(#lineGlow)');
    svgMain.appendChild(el);
    return { el, len };
}

/** Animate a line: stroke-dashoffset → 0 after delayMs over durationMs */
function animLine(obj, delayMs, durationMs) {
    setTimeout(() => {
        obj.el.style.transition =
            `stroke-dashoffset ${durationMs}ms cubic-bezier(0.25,0.46,0.45,0.94)`;
        obj.el.style.strokeDashoffset = '0';
    }, delayMs);
}

/** Animate a ring (outlineSvg element): dashoffset → 0 */
function animRing(el, delayMs, durationMs) {
    setTimeout(() => {
        el.style.transition =
            `stroke-dashoffset ${durationMs}ms cubic-bezier(0.25,0.46,0.45,0.94)`;
        el.style.strokeDashoffset = '0';
    }, delayMs);
}

/** Animate a small detail (crosshair / tick / diamond) */
function animDetail(el, delayMs, durationMs) {
    setTimeout(() => {
        el.style.transition = `stroke-dashoffset ${durationMs}ms ease`;
        el.style.strokeDashoffset = '0';
    }, delayMs);
}

/** Brief golden spark at the arrival point of an incoming line */
function addSpark(x, y, delayMs) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', x); c.setAttribute('cy', y);
    c.setAttribute('r', '5');
    c.setAttribute('fill', 'rgba(255,220,120,1)');
    c.setAttribute('filter', 'url(#lineGlow)');
    c.style.opacity = '0';
    svgMain.appendChild(c);
    setTimeout(() => {
        c.style.transition = 'opacity 0.15s ease';
        c.style.opacity    = '1';
        setTimeout(() => {
            c.style.transition = 'opacity 1.5s ease';
            c.style.opacity    = '0';
            setTimeout(() => c.remove(), 1600);
        }, 250);
    }, delayMs);
}

/* ── Build nav layout (spokes + nodes) ──────────────────── */
function buildLayout() {
    nodeEls.forEach(el => el.remove());
    nodeEls.length  = 0;
    spokeData.length = 0;
    // Clear previous spoke lines (keep <defs> at index 0)
    while (svgMain.children.length > 1) svgMain.removeChild(svgMain.lastChild);

    const maxDx = Math.max(...NODES.map(n => Math.abs(n.dx)));
    const maxDy = Math.max(...NODES.map(n => Math.abs(n.dy)));
    const sc    = Math.min(1, (W * 0.38) / maxDx, (H * 0.40) / maxDy);

    NODES.forEach(node => {
        const dx  = node.dx * sc;
        const dy  = node.dy * sc;
        const ex  = CX + dx * 0.85;
        const ey  = CY + dy * 0.85;
        const len = Math.hypot(dx * 0.85, dy * 0.85);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', CX); line.setAttribute('y1', CY);
        line.setAttribute('x2', ex); line.setAttribute('y2', ey);
        line.setAttribute('stroke', 'rgba(184,154,90,0.48)');
        line.setAttribute('stroke-width', '1');
        line.setAttribute('stroke-dasharray', len);
        line.setAttribute('stroke-dashoffset', len);
        line.setAttribute('filter', 'url(#spokeGlow)');
        svgMain.appendChild(line);
        spokeData.push({ line, len });

        const a = document.createElement('a');
        a.className = 'nav-node';
        a.href      = node.url;
        a.style.left = (CX + dx) + 'px';
        a.style.top  = (CY + dy) + 'px';
        a.innerHTML  = `<span class="nav-icon">${node.icon}</span>
                        <span class="nav-label">${node.name}</span>`;
        scene.appendChild(a);
        nodeEls.push(a);
    });
}

/* ── Animate nav spokes + nodes ─────────────────────────── */
function triggerSpokes() {
    spokeData.forEach((sp, i) => {
        setTimeout(() => {
            sp.line.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)';
            sp.line.style.strokeDashoffset = '0';
            setTimeout(() => {
                nodeEls[i].style.transition = 'opacity 0.5s ease';
                nodeEls[i].style.opacity    = '1';
                nodeEls[i].classList.add('on');
            }, 800);
        }, i * 240);
    });
    const total = (spokeData.length - 1) * 240 + 800 + 700;
    setTimeout(() => hint.classList.add('on'), total);
}

/* ── Master animation sequence ──────────────────────────── */
function startSequence() {
    /*
     * Three incoming lines, one per ring:
     *   L1 — from LEFT  edge → outer ring left  tangent  (CX−R1, CY)
     *   L2 — from TOP   edge → middle ring top  tangent  (CX,    CY−R2)
     *   L3 — from RIGHT edge → inner ring right tangent  (CX+R3, CY)
     *
     * When a line arrives at the tangent, the corresponding ring begins
     * to draw itself from that exact point (stroke-dashoffset → 0).
     */

    // Tangent arrival points on screen
    const p1 = { x: CX - R1, y: CY };       // outer ring, left
    const p2 = { x: CX,      y: CY - R2 };  // middle ring, top
    const p3 = { x: CX + R3, y: CY };       // inner ring, right

    // Off-screen start points
    const s1 = { x: -20,    y: CY };
    const s2 = { x: CX,     y: -20 };
    const s3 = { x: W + 20, y: CY };

    // Lengths
    const len1 = p1.x - s1.x;
    const len2 = p2.y - s2.y;
    const len3 = s3.x - p3.x;

    // Durations (speed-based, min 180ms)
    const dur1 = Math.max(180, (len1 / LINE_SPEED) * 1000);
    const dur2 = Math.max(180, (len2 / LINE_SPEED) * 1000);
    const dur3 = Math.max(180, (len3 / LINE_SPEED) * 1000);

    // Stagger line starts
    const t1start = 0;
    const t2start = 180;
    const t3start = 360;

    // When each line arrives (triggers ring draw)
    const t1arrive = t1start + dur1;
    const t2arrive = t2start + dur2;
    const t3arrive = t3start + dur3;

    // Ring draw durations
    const rd1 = 1400;
    const rd2 = 1100;
    const rd3 =  950;

    // When all rings are done
    const allDone = Math.max(t1arrive + rd1, t2arrive + rd2, t3arrive + rd3);

    // ── Create & animate incoming lines ──
    const l1 = makeLine(s1.x, s1.y, p1.x, p1.y, 1.5, 0.9);
    const l2 = makeLine(s2.x, s2.y, p2.x, p2.y, 1.5, 0.9);
    const l3 = makeLine(s3.x, s3.y, p3.x, p3.y, 1.5, 0.9);

    animLine(l1, t1start, dur1);
    animLine(l2, t2start, dur2);
    animLine(l3, t3start, dur3);

    // ── Arrival sparks ──
    addSpark(p1.x, p1.y, t1arrive);
    addSpark(p2.x, p2.y, t2arrive);
    addSpark(p3.x, p3.y, t3arrive);

    // ── Rings draw from where lines arrived ──
    animRing(ring1, t1arrive, rd1);
    animRing(ring2, t2arrive, rd2);
    animRing(ring3, t3arrive, rd3);

    // ── Fine details ──
    animDetail(ch1,     allDone,        400);
    animDetail(ch2,     allDone + 120,  400);
    animDetail(starT,   allDone + 350,  240);
    animDetail(diamond, allDone + 500,  320);

    // ── Logo image fades in, outline fades out ──
    const tReveal = allDone + 450;
    setTimeout(() => logo.classList.add('on'),        tReveal);
    setTimeout(() => outlineSvg.classList.add('fade'), tReveal + 700);

    // ── "S.A.L. Tools" label ──
    setTimeout(() => logoName.classList.add('on'), tReveal + 200);

    // ── Nav spokes + nodes ──
    setTimeout(triggerSpokes, tReveal + 800);
}

/* ── Init ────────────────────────────────────────────────── */
function init() {
    W = window.innerWidth;
    H = window.innerHeight;
    CX = W / 2; CY = H / 2;
    buildLayout();
    startSequence();
}

window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    CX = W / 2; CY = H / 2;
});

init();
})();
</script>
</body>
</html>
